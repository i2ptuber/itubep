{% extends "base.html" %}
{% block title %}{{ t('publish.title') }} — ITubeP{% endblock %}
{% block content %}
    <h1>{{ t('publish.title') }}</h1>
    <p>{{ t('publish.description') }}</p>

    <button id="publish-btn">{{ t('publish.button') }}</button>
    <div id="publish-status"></div>

    <script>
        const BRIDGE_URL = "http://127.0.0.1:9080";

        async function getOrCreateToken() {
            let token = localStorage.getItem("itubep_bridge_token");
            if (token) return token;

            await fetch(`${BRIDGE_URL}/bridge/pair/request`, { method: "POST", mode: "no-cors" });

            const code = prompt(window.t("publish.enter_code_prompt"));
            if (!code) throw new Error(window.t("publish.error_no_code"));

            const resp = await fetch(`${BRIDGE_URL}/bridge/pair/confirm`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code }),
            });
            if (!resp.ok) throw new Error(window.t("publish.error_bad_code"));

            const data = await resp.json();
            localStorage.setItem("itubep_bridge_token", data.token);
            return data.token;
        }

        document.getElementById("publish-btn").addEventListener("click", async () => {
            const statusEl = document.getElementById("publish-status");
            statusEl.textContent = window.t("publish.status_pairing");

            try {
                const token = await getOrCreateToken();
                statusEl.textContent = window.t("publish.status_wizard");

                const resp = await fetch(`${BRIDGE_URL}/bridge/publish`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}` },
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || window.t("publish.error_unknown"));
                }

                const data = await resp.json();
                statusEl.innerHTML = window.t("publish.status_published") +
                    `<a href="/video/${data.video_id}">${window.t("publish.open_video")}</a>`;
            } catch (e) {
                statusEl.textContent = window.t("publish.status_error") + e.message;
            }
        });
    </script>
{% endblock %}
